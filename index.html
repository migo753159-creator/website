<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Sweet House</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #fff8f0;
    scroll-behavior: smooth;
}

/* Header */
header {
    background: linear-gradient(135deg, #8b4513, #d2691e);
    color: white;
    text-align: center;
    padding: 30px;
}

/* Navbar */
nav {
    background-color: #d2691e;
    padding: 12px;
    display: flex;
    justify-content: center; 
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    padding: 5px 15px;
    transition: 0.3s;
}

nav a:hover {
    color: #ffe4c4;
    text-decoration: underline;
}

section {
    padding: 30px;
    text-align: center;
}

/* 統一的卡片佈局容器 */
.item-grid-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
}

/* Menu 與 Products 共用的卡片樣式 */
.item-card {
    flex: 1 1 calc(33.333% - 40px);
    min-width: 280px;
    max-width: 350px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
    display: flex;
    flex-direction: column;
}
